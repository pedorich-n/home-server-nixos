name: Nix Flake Check
on:
  push:
  workflow_dispatch:

jobs:
  nix-flake-check:
    uses: pedorich-n/github-workflows/.github/workflows/flake-check.yaml@ab0b55f0c919123865d500485c7a275c487e6466 # main
    with:
      timeout_minutes: 20
      app_client_id: ${{ vars.APP_CLIENT_ID }}
      app_owner: ${{ github.repository_owner }}
    secrets:
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
