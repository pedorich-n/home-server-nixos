name: Nix Flake Check
on:
  push:
  workflow_dispatch:

jobs:
  nix-flake-check:
    uses: pedorich-n/github-workflows/.github/workflows/flake-check.yaml@4d50a53f6c21f611aff2bc80ac245b5368f4ff95 # main
    with:
      timeout_minutes: 20
      app_client_id: ${{ vars.APP_CLIENT_ID }}
      app_owner: ${{ github.repository_owner }}
    secrets:
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
