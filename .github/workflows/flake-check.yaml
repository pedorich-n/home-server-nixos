name: Nix Flake Check
on: push

jobs:
  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup job
        uses: pedorich-n/github-workflows/.github/actions/setup-nix-job@main
      - name: Rewrite SSH → HTTPS git URLs
        run: |
          git config --global url."https://oauth2:${{ secrets.GH_ACCESS_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Flake Check
        run: nix flake check
