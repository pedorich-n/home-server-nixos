name: Update flake.lock
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 10 1 * *"

jobs:
  update-flake-lock:
    uses: pedorich-n/github-workflows/.github/workflows/update-flake-lock.yaml@62dc3beeb539fd74b6889aa7de186bdddcc742bb # main
    with:
      app_client_id: ${{ vars.APP_CLIENT_ID }}
      app_owner: ${{ github.repository_owner }}
    secrets:
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
