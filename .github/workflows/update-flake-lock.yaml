name: Update flake.lock
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 10 1 * *"

jobs:
  update-flake-lock:
    uses: pedorich-n/github-workflows/.github/workflows/update-flake-lock.yaml@f32e404b915ad8006f9dac6903e30f4be78f6524 # main
    with:
      app_client_id: ${{ vars.APP_CLIENT_ID }}
      app_owner: ${{ github.repository_owner }}
    secrets:
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
