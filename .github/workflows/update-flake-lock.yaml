name: Update flake.lock
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 10 1 * *"

jobs:
  update-flake-lock:
    uses: pedorich-n/github-workflows/.github/workflows/update-flake-lock.yaml@a43ffb5e5e261eb6d552774e84e690dbc7269405 # main
    with:
      nix_version: "2.31.2"
    secrets:
      gh_access_token: ${{ secrets.GH_ACCESS_TOKEN }}
      ssh_key: ${{ secrets.SSH_ACTION_KEY }}
