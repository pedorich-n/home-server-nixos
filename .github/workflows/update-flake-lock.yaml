  schedule:
    - cron: "0 10 1 * *"

jobs:
  update-flake-lock:
    # permissions:
    #   contents: write
    #   pull-requests: write
    uses: pedorich-n/github-workflows/.github/workflows/update-flake-lock.yaml@https-instead-of-ssh
    with:
      nix_version: "2.31.2"
    secrets:
      git_https_token: ${{ secrets.GH_ACCESS_TOKEN }}
      # ssh_key: ${{ secrets.SSH_ACTION_KEY }}
