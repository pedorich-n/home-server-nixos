name: Update flake.lock
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 10 1 * *"

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Setup job
        uses: pedorich-n/github-workflows/.github/actions/setup-nix-job@main

      - name: Rewrite SSH → HTTPS git URLs
        uses: ./.github/actions/git-url-rewrite
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          branch: update_flake_lock_action
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated
