name: Update Packages' Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 1 * *"

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get Github App info
        id: app_auth
        uses: pedorich-n/github-workflows/.github/actions/app-token@62dc3beeb539fd74b6889aa7de186bdddcc742bb # main
        with:
          client_id: ${{ vars.APP_CLIENT_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Setup job
        uses: pedorich-n/github-workflows/.github/actions/setup-nix-job@62dc3beeb539fd74b6889aa7de186bdddcc742bb # main
        with:
          git_https_token: ${{ steps.app_auth.outputs.token }}

      - name: Update packages' sources
        run: nix run .#update-packages

      - name: Check for changes
        id: git-check
        shell: bash
        run: |
          git diff --quiet || echo "changes_detected=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.git-check.outputs.changes_detected
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "Update packages' sources"
          title: "Update packages' sources"
          branch: "update_packages"
          labels: |
            dependencies
            automated
